<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoldTrack Pro | أسعار الذهب الشاملة والعملات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { gold: { 50:'#fffbeb',100:'#fef3c7',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' } } } }
    }
  </script>
  <style>
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
    .dark .glass { background: rgba(15,23,42,0.88); }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .row-hover:hover { background: rgba(245,158,11,0.06); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans">

  <header class="glass sticky top-0 z-40 border-b border-gray-200 dark:border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center text-white font-bold shadow">💰</div>
        <div>
          <h1 class="text-xl font-bold tracking-tight">GoldTrack<span class="text-gold-500">Pro</span></h1>
          <p class="text-xs text-gray-500 dark:text-gray-400">كل العيارات • الغرام • الكيلو • السبائك • العملات</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <select id="country" class="bg-white dark:bg-slate-800 border rounded px-3 py-1.5 text-sm outline-none"></select>
        <button id="theme-btn" class="p-2 rounded border hover:bg-gray-100 dark:hover:bg-slate-800">🌙</button>
      </div>
    </div>
  </header>

  <div class="bg-gold-50 dark:bg-slate-800/50 border-b border-gold-100 py-2 px-4">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-2 text-xs text-gold-800 dark:text-gold-200">
      <span>آخر تحديث: <strong id="sync-time">--:--:--</strong></span>
      <button id="refresh-btn" class="hover:underline font-medium">🔄 تحديث</button>
    </div>
  </div>

  <main class="flex-1 max-w-6xl mx-auto px-4 py-6 w-full space-y-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="quick-cards"></div>

    <div class="glass rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
      <div class="px-4 py-3 border-b bg-gray-100 dark:bg-slate-800 font-semibold">🪙 أسعار الذهب حسب العيار (لغرام والكيلو)</div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase">
            <tr><th class="px-4 py-3 text-right">العيار</th><th class="px-4 py-3 text-right">النقاء</th><th class="px-4 py-3 text-left">الغرام</th><th class="px-4 py-3 text-left">الكيلو</th></tr>
          </thead>
          <tbody id="carat-table"></tbody>
        </table>
      </div>
    </div>

    <div class="glass rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
      <div class="px-4 py-3 border-b bg-gray-100 dark:bg-slate-800 font-semibold">📦 القطع الذهبية والسبائك</div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase">
            <tr><th class="px-4 py-3 text-right">الاسم</th><th class="px-4 py-3 text-right">الوزن</th><th class="px-4 py-3 text-right">العيار</th><th class="px-4 py-3 text-left">السعر المحلي</th></tr>
          </thead>
          <tbody id="coins-table"></tbody>
        </table>
      </div>
    </div>

    <div class="glass rounded-xl border border-gray-200 dark:border-slate-700 overflow-hidden">
      <div class="px-4 py-3 border-b bg-gray-100 dark:bg-slate-800 font-semibold">💱 أسعار العملات</div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs text-gray-500 dark:text-gray-400 uppercase">
            <tr><th class="px-4 py-3 text-right">العملة</th><th class="px-4 py-3 text-left">السعر</th></tr>
          </thead>
          <tbody id="fx-table"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const COUNTRIES = [
      { code:'TR', name:'تركيا 🇹', cur:'TRY', sym:'₺', prem:0.06 },
      { code:'SA', name:'السعودية 🇸🇦', cur:'SAR', sym:'ر.س', prem:0.015 },
      { code:'AE', name:'الإمارات 🇦', cur:'AED', sym:'د.إ', prem:0.02 },
      { code:'EG', name:'مصر 🇪🇬', cur:'EGP', sym:'ج.م', prem:0.04 },
      { code:'US', name:'الولايات المتحدة 🇺🇸', cur:'USD', sym:'$', prem:0.01 }
    ];

    const CARATS = [24, 22, 21, 18, 14];
    const COINS = [
      { name:'ليرة ذهبية تركية', weight:7.0, k:22 },
      { name:'نصف ليرة', weight:3.5, k:22 },
      { name:'ربع ليرة', weight:1.75, k:22 },
      { name:'سبيكة 1 أونصة', weight:31.1035, k:24 },
      { name:'سبيكة 100 غرام', weight:100, k:24 }
    ];

    // بيانات افتراضية (تظهر دائماً)
    let mockData = {
      goldUSD: 2385.50,
      rates: { TRY: 32.15, SAR: 3.75, AED: 3.67, EGP: 47.50, USD: 1, EUR: 0.92, GBP: 0.79 },
      updated: Date.now()
    };

    function calcAll(ounceUSD, fxRate, country) {
      const gram24 = ounceUSD / 31.1035;
      return {
        gram: CARATS.map(k => ({
          k, purity: (k/24*100).toFixed(1)+'%',
          priceGram: (gram24 * (k/24) * fxRate * (1+country.prem)).toFixed(2),
          priceKilo: ((gram24 * (k/24) * 1000) * fxRate * (1+country.prem)).toFixed(2)
        })),
        coins: COINS.map(c => ({
          name: c.name, weight: c.weight+'غ', k: c.k+'K',
          price: ((gram24 * (c.k/24) * c.weight) * fxRate * (1+country.prem)).toFixed(2)
        }))
      };
    }

    function render(data, country) {
      document.getElementById('sync-time').textContent = new Date(data.updated || Date.now()).toLocaleTimeString('ar-EG');
      
      const rates = calcAll(data.goldUSD, data.rates[country.cur], country);
      
      document.getElementById('quick-cards').innerHTML = `
        <div class="glass rounded p-4 border"><div class="text-xs text-gray-500">أونصة عالمي</div><div class="text-lg font-bold text-gold-600">${data.goldUSD.toFixed(2)} $</div></div>
        <div class="glass rounded p-4 border"><div class="text-xs text-gray-500">سعر الصرف (1$)</div><div class="text-lg font-bold">${data.rates[country.cur].toFixed(4)} ${country.sym}</div></div>
        <div class="glass rounded p-4 border"><div class="text-xs text-gray-500">غرام 24K</div><div class="text-lg font-bold">${rates.gram[0].priceGram} ${country.sym}</div></div>
        <div class="glass rounded p-4 border"><div class="text-xs text-gray-500">ليرة ذهبية</div><div class="text-lg font-bold">${rates.coins[0].price} ${country.sym}</div></div>
      `;

      document.getElementById('carat-table').innerHTML = rates.gram.map(c => `
        <tr class="row-hover"><td class="px-4 py-3 font-medium">${c.k}K</td><td class="px-4 py-3 text-gray-500">${c.purity}</td>
        <td class="px-4 py-3 text-left font-mono">${c.priceGram} ${country.sym}</td><td class="px-4 py-3 text-left font-mono">${c.priceKilo} ${country.sym}</td></tr>
      `).join('');

      document.getElementById('coins-table').innerHTML = rates.coins.map(c => `
        <tr class="row-hover"><td class="px-4 py-3 font-medium">${c.name}</td><td class="px-4 py-3 text-gray-500">${c.weight}</td>
        <td class="px-4 py-3 text-gray-500">${c.k}</td><td class="px-4 py-3 text-left font-mono">${c.price} ${country.sym}</td></tr>
      `).join('');

      const fxList = Object.entries(data.rates).slice(0, 6);
      document.getElementById('fx-table').innerHTML = fxList.map(([c, s]) => `
        <tr class="row-hover"><td class="px-4 py-3 font-medium">${c}</td><td class="px-4 py-3 text-left font-mono">${s.toFixed(c==='USD'||c==='EUR'||c==='GBP'?4:2)}</td></tr>
      `).join('');
    }

    function getCountry() {
      return COUNTRIES.find(c => c.code === document.getElementById('country').value) || COUNTRIES[0];
    }

    // محاولة جلب من API، وإذا فشل نستخدم البيانات الافتراضية
    async function loadData() {
      try {
        const res = await fetch('https://gold-api.hsnalwsf05.workers.dev/');
        const data = await res.json();
        if(data.goldUSD && data.rates) {
          mockData = data; // تحديث البيانات
        }
      } catch(e) {
        console.log('Using mock data');
      }
      render(mockData, getCountry());
    }

    document.getElementById('country').innerHTML = COUNTRIES.map(c => `<option value="${c.code}">${c.name}</option>`).join('');
    document.getElementById('country').onchange = () => loadData();
    document.getElementById('refresh-btn').onclick = () => loadData();
    document.getElementById('theme-btn').onclick = () => {
      const dark = document.documentElement.classList.toggle('dark');
      document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    };
    if(localStorage.getItem('theme')==='dark' || (!localStorage.getItem('theme') && matchMedia('(prefers-color-scheme:dark)').matches)){
      document.documentElement.classList.add('dark'); 
      document.getElementById('theme-btn').textContent='☀️';
    }
    
    // تحميل أولي
    loadData();
    // تحديث كل 60 ثانية
    setInterval(loadData, 60000);
  </script>
</body>
</html>
