<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Altın ve Döviz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #080b13;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 { margin: 0; }
    span { color: #f2a51a; }

    main {
      max-width: 1100px;
      margin: 25px auto;
      padding: 0 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card, table {
      background: #111827;
      border: 1px solid #29354d;
      border-radius: 8px;
    }

    .card {
      padding: 18px;
    }

    .label {
      color: #9aa8bf;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      margin-bottom: 20px;
    }

    th, td {
      padding: 13px;
      border-bottom: 1px solid #29354d;
      text-align: left;
    }

    th {
      color: #9aa8bf;
      background: #151f32;
    }

    select, button {
      padding: 10px;
      background: #151f32;
      color: white;
      border: 1px solid #29354d;
      border-radius: 6px;
    }

    button {
      background: #d97706;
      cursor: pointer;
    }

    #status {
      color: #9aa8bf;
      margin-bottom: 15px;
    }

    @media (max-width: 700px) {
      table { display: block; overflow-x: auto; }
      header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Altın <span>Piyasası</span></h1>
  <div>
    <select id="currency">
      <option value="TRY">TRY</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="SAR">SAR</option>
      <option value="AED">AED</option>
      <option value="EGP">EGP</option>
      <option value="SYP">SYP</option>
    </select>
    <button onclick="loadData()">Yenile</button>
  </div>
</header>

<main>
  <div id="status">Yükleniyor...</div>

  <div class="cards">
    <div class="card">
      <div class="label">Ons Altın</div>
      <div id="ounce" class="value">-</div>
    </div>
    <div class="card">
      <div class="label">Gram 24 Ayar</div>
      <div id="gram24" class="value">-</div>
    </div>
    <div class="card">
      <div class="label">Dolar</div>
      <div id="usd" class="value">-</div>
    </div>
    <div class="card">
      <div class="label">Euro</div>
      <div id="eur" class="value">-</div>
    </div>
  </div>

  <h2>Altın Fiyatları</h2>
  <table>
    <thead>
      <tr>
        <th>Ayar</th>
        <th>Gram</th>
        <th>Alış</th>
        <th>Satış</th>
        <th>Kilo</th>
      </tr>
    </thead>
    <tbody id="goldTable"></tbody>
  </table>

  <h2>Döviz</h2>
  <table>
    <thead>
      <tr>
        <th>Para</th>
        <th>1 USD Karşılığı</th>
      </tr>
    </thead>
    <tbody id="currencyTable"></tbody>
  </table>
</main>

<script>
  window.GOLD_API_URL = "https://gold-api.hsnalwsf05.workers.dev/";
</script>
<script src="app.js"></script>

</body>
</html>
